name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Least-privilege: CI only reads source and runs tests — no write scopes.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: curricmesh
          POSTGRES_PASSWORD: curricmesh
          POSTGRES_DB: curricmesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U curricmesh"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://curricmesh:curricmesh@localhost:5432/curricmesh
      DATABASE_URL_SYNC: postgresql+psycopg2://curricmesh:curricmesh@localhost:5432/curricmesh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify migration chain (upgrade + downgrade)
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v

  # Non-blocking measurable-AI signal (Task C4). DB-free: scores the AI at the
  # Protocol seam (gap precision/recall, QA-judge agreement) against recorded
  # snapshots — no Postgres, no ANTHROPIC_API_KEY, no network. continue-on-error
  # so it can never fail the build; it publishes a markdown report artifact.
  ai-eval:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run AI eval (recorded snapshot)
        working-directory: backend
        run: python -m app.ai.eval.run_eval ai_eval_report.md

      - name: Upload AI eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-eval-report
          path: backend/ai_eval_report.md

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # npm ci = reproducible, lockfile-pinned install — the supply-chain control.
        # package-lock.json is regenerated inside a node:20 Linux container so it
        # carries the Linux native/optional deps a macOS lockfile lacked; verified
        # `npm ci` + build + tests pass on Linux. (--ignore-scripts is NOT used:
        # the Vite/esbuild native build needs install scripts. Lockfile pinning +
        # the high/critical audit gate below + the read-only token are the controls.)
        run: npm ci

      - name: Audit dependencies (fail on high/critical)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test -- --run

  # Translation-effects layout regime (T1). Real Chromium (Playwright) measures
  # layout under pseudolocalization to catch text-expansion overflow — jsdom
  # cannot. Kept a DISTINCT job so it never slows the fast vitest frontend job.
  # Visual-regression assertions self-skip on CI (baselines are platform-
  # specific); the deterministic overflow detector is the gate that runs here.
  frontend-e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run translation-effects layout tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
