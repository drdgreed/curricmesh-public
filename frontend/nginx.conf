# Serves the CurricMesh SPA. Caddy terminates TLS and reverse-proxies /api/*
# to the backend upstream, so this nginx only ever serves static assets and
# the SPA-fallback index.html — it never sees /api/* traffic.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long-cache the fingerprinted assets (Vite emits content-hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any non-file route resolves to index.html so client-side
    # routing (react-router) works on deep links / refresh.
    location / {
        try_files $uri /index.html;
    }
}
